<!DOCTYPE html>
<html>
  <head>
    <title>Aktivitas - VLA25</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');

      body {
        background-color: #f5e6ff;
        background-image: radial-gradient(circle at 20% 20%, #e8b4ff 0%, transparent 50%),
                          radial-gradient(circle at 80% 80%, #c084fc 0%, transparent 50%);
        color: #4a0080;
        font-family: 'Quicksand', Arial, sans-serif;
        margin: 0;
        min-height: 100vh;
      }

      .header {
        background: linear-gradient(135deg, #2d0057 0%, #4a0080 40%, #7b2fa8 100%);
        text-align: center;
        padding: 60px 20px 40px;
        position: relative;
        overflow: hidden;
      }

      .header::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, #d308fa22 0%, transparent 60%);
        animation: shimmer 4s ease-in-out infinite;
      }

      @keyframes shimmer {
        0%, 100% { transform: translate(0, 0); }
        50% { transform: translate(10%, 10%); }
      }

      .header h1 {
        color: #d308fa;
        letter-spacing: 6px;
        font-size: 48px;
        text-shadow: 0 0 20px #d308fa88;
        margin: 10px 0;
      }

      .sub-judul {
        color: #e8b4ff;
        letter-spacing: 8px;
        font-size: 11px;
        margin: 8px 0;
      }

      .navbar {
        background: linear-gradient(90deg, #1a0030, #3a0060, #1a0030);
        display: flex;
        justify-content: center;
        gap: 30px;
        padding: 14px 20px;
        border-bottom: 1px solid #d308fa44;
        position: relative;
      }

      .navbar a {
        color: #e8b4ff;
        text-decoration: none;
        font-size: 12px;
        letter-spacing: 2px;
        text-transform: uppercase;
        padding: 5px 10px;
        border-radius: 20px;
        transition: all 0.3s;
      }

      .navbar a:hover {
        color: #ffffff;
        background-color: #d308fa44;
      }

      .hamburger {
        display: none;
        background: none;
        border: none;
        cursor: pointer;
        padding: 5px;
        position: absolute;
        right: 20px;
        top: 50%;
        transform: translateY(-50%);
      }

      .hamburger span {
        display: block;
        width: 24px;
        height: 2px;
        background: #e8b4ff;
        margin: 5px 0;
        transition: all 0.3s;
      }

      .nav-links {
        display: flex;
        gap: 30px;
        align-items: center;
      }

      .konten {
        max-width: 900px;
        margin: 40px auto;
        padding: 0 30px;
      }

      .konten h2 {
        color: #9b30d9;
        letter-spacing: 2px;
        border-bottom: 2px solid #f0a0ff;
        padding-bottom: 8px;
        margin-bottom: 40px;
      }

      .polaroid-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 24px;
        padding: 10px;
      }

      .polaroid {
        background: #ffffff;
        border-radius: 8px;
        padding: 10px 10px 30px;
        box-shadow: 3px 6px 20px #7b2fa833;
        cursor: pointer;
        transition: transform 0.3s;
        text-decoration: none;
      }

      .polaroid:nth-child(odd) { transform: rotate(-2deg); }
      .polaroid:nth-child(even) { transform: rotate(1.5deg); }
      .polaroid:hover { transform: rotate(0deg) scale(1.05) !important; }

      .polaroid-img {
        width: 100%;
        aspect-ratio: 1;
        background: linear-gradient(135deg, #EEEDFE, #AFA9EC);
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 12px;
        overflow: hidden;
        font-size: 40px;
        color: #534AB7;
      }

      .polaroid-judul {
        font-size: 12px;
        font-weight: 700;
        color: #4a0080;
        text-align: center;
        margin-bottom: 4px;
      }

      .polaroid-member {
        font-size: 10px;
        color: #9b30d9;
        text-align: center;
        margin-bottom: 4px;
      }

      .polaroid-tgl {
        font-size: 10px;
        color: #AFA9EC;
        text-align: center;
      }

      .kosong {
        text-align: center;
        color: #9b30d9;
        font-style: italic;
        padding: 40px;
      }

      /* MOBILE */
      @media (max-width: 600px) {
        .header h1 { font-size: 32px; letter-spacing: 4px; }

        .hamburger { display: block; }

        .nav-links {
          display: none;
          flex-direction: column;
          gap: 0;
          width: 100%;
          padding: 10px 0;
        }

        

        .nav-links a {
          padding: 12px 20px;
          border-radius: 0;
          border-bottom: 1px solid #d308fa22;
          width: 100%;
          text-align: center;
        }

        .navbar { justify-content: flex-start; flex-wrap: wrap; padding: 14px 20px; }

        .konten { padding: 0 16px; margin: 24px auto; }

        .polaroid-grid {
          grid-template-columns: repeat(2, 1fr);
          gap: 16px;
          padding: 6px;
        }

        .polaroid:nth-child(odd) { transform: rotate(-1deg); }
        .polaroid:nth-child(even) { transform: rotate(1deg); }

        .polaroid-img { font-size: 28px; }
        .polaroid-judul { font-size: 11px; }
      }

      .navbar a.aktif {
        color: #ffffff;
        background-color: #d308fa66;
        border: 1px solid #d308fa88;
      }

      </style>
      <link rel="stylesheet" href="animations.css">
</head>

        <a href="pengumuman.html">Pengumuman</a>

    <div class="konten">
      <h2>Aktivitas</h2>
      <div class="polaroid-grid" id="polaroid-grid"></div>
    </div>

    <script>



      // SKELETON
      document.getElementById('polaroid-grid').innerHTML = Array(6).fill(0).map(() =>
        `<div class="polaroid skeleton" style="height:200px;"></div>`
      ).join('');

      const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRIB37AAHdM1-AU03TAyE-DZ6b7MJWZTOwsgOSvOa8V-rc4OL5wZtbObgxrXQtCP2aSkj4SeArRx1c6/pub?gid=1433986273&single=true&output=csv";

      fetch(SHEET_URL)
        .then(res => res.text())
        .then(csv => {
          const baris = csv.trim().split('\n').slice(1);
          const container = document.getElementById('polaroid-grid');

          if (baris.length === 0) {
            container.innerHTML = '<div class="kosong">Belum ada aktivitas.</div>';
            return;
          }

          baris.reverse().forEach(b => {
            const kolom = b.split(',');
            const tanggal = kolom[0]?.trim();
            const judul = kolom[1]?.trim();
            const member = kolom[2]?.trim();
            const link = kolom[3]?.trim();

            if (!judul) return;

            const memberTampil = member
              ? member.split('&').map(m => m.trim()).join(' · ')
              : '';

            const kartu = document.createElement('a');
            kartu.className = 'polaroid fade-in';
            kartu.href = link || '#';
            kartu.target = '_blank';
            kartu.innerHTML = `
              <div class="polaroid-img">🎵</div>
              <div class="polaroid-judul">${judul}</div>
              <div class="polaroid-member">${memberTampil}</div>
              <div class="polaroid-tgl">${tanggal || ''}</div>
            `;
            container.appendChild(kartu);
          });
        });
    </script>
