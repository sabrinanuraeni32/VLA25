<!DOCTYPE html>
<html>
  <head>
    <title>Pengumuman - VLA25</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');

      body {
        background-color: #f5e6ff;
        background-image: radial-gradient(circle at 20% 20%, #e8b4ff 0%, transparent 50%),
                          radial-gradient(circle at 80% 80%, #c084fc 0%, transparent 50%);
        color: #4a0080;
        font-family: 'Quicksand', Arial, sans-serif;
        margin: 0;
        min-height: 100vh;
      }

      .header {
        background: linear-gradient(135deg, #2d0057 0%, #4a0080 40%, #7b2fa8 100%);
        text-align: center;
        padding: 60px 20px 40px;
        position: relative;
        overflow: hidden;
      }

      .header::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, #d308fa22 0%, transparent 60%);
        animation: shimmer 4s ease-in-out infinite;
      }

      @keyframes shimmer {
        0%, 100% { transform: translate(0, 0); }
        50% { transform: translate(10%, 10%); }
      }

      .header a {
        color: #e8b4ff;
        font-size: 12px;
        letter-spacing: 2px;
        text-decoration: none;
        display: block;
        margin-bottom: 10px;
      }

      .header a:hover { color: #ffffff; }

      .header h1 {
        color: #d308fa;
        letter-spacing: 6px;
        font-size: 48px;
        text-shadow: 0 0 20px #d308fa88;
        margin: 10px 0 0;
      }

      .navbar {
        background: linear-gradient(90deg, #1a0030, #3a0060, #1a0030);
        display: flex;
        justify-content: center;
        gap: 30px;
        padding: 14px 20px;
        border-bottom: 1px solid #d308fa44;
        position: relative;
      }

      .navbar a {
        color: #e8b4ff;
        text-decoration: none;
        font-size: 12px;
        letter-spacing: 2px;
        text-transform: uppercase;
        padding: 5px 10px;
        border-radius: 20px;
        transition: all 0.3s;
      }

      .navbar a:hover {
        color: #ffffff;
        background-color: #d308fa44;
      }

      .hamburger {
        display: none;
        background: none;
        border: none;
        cursor: pointer;
        padding: 5px;
        position: absolute;
        right: 20px;
        top: 50%;
        transform: translateY(-50%);
      }

      .hamburger span {
        display: block;
        width: 24px;
        height: 2px;
        background: #e8b4ff;
        margin: 5px 0;
        transition: all 0.3s;
      }

      .nav-links {
        display: flex;
        gap: 30px;
        align-items: center;
      }

      .konten {
        max-width: 800px;
        margin: 40px auto;
        background: #ffffff;
        border: 1px solid #d308fa44;
        border-radius: 15px;
        padding: 30px;
        box-shadow: 0 4px 15px #d308fa11;
      }

      .pengumuman-foto {
        width: 100%;
        max-height: 400px;
        object-fit: cover;
        border-radius: 10px;
        margin-bottom: 24px;
      }

      .pengumuman-tanggal {
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #9b30d9;
        margin-bottom: 8px;
      }

      .pengumuman-judul {
        font-size: 24px;
        font-weight: 700;
        color: #d308fa;
        margin-bottom: 20px;
      }

      .pengumuman-isi {
        font-size: 14px;
        color: #4a0080;
        line-height: 1.8;
        white-space: pre-line;
      }

      /* MOBILE */
      @media (max-width: 600px) {
        .header h1 { font-size: 32px; letter-spacing: 4px; }

        .hamburger { display: block; }

        .nav-links {
          display: none;
          flex-direction: column;
          gap: 0;
          width: 100%;
          padding: 10px 0;
        }

        

        .nav-links a {
          padding: 12px 20px;
          border-radius: 0;
          border-bottom: 1px solid #d308fa22;
          width: 100%;
          text-align: center;
        }

        .navbar { justify-content: flex-start; flex-wrap: wrap; padding: 14px 20px; }

        .konten {
          margin: 16px;
          padding: 20px 16px;
        }

        .pengumuman-judul { font-size: 18px; }
        .pengumuman-isi { font-size: 13px; }
        .pengumuman-foto { max-height: 220px; }
      }

      .navbar a.aktif {
        color: #ffffff;
        background-color: #d308fa66;
        border: 1px solid #d308fa88;
      }

      </style>
      <link rel="stylesheet" href="animations.css">
</head>
  <body>

    <div class="header">
      <img src="logo.jpeg" alt="Logo VLA25" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin-bottom: 15px;">
      <a href="pengumuman.html">← Kembali ke Pengumuman</a>
      <h1>VLA25</h1>
    </div>

    <nav class="navbar">
      <button class="hamburger" aria-label="Menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <div class="nav-links" id="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="members.html">Members</a>
        <a href="aktivitas.html">Aktivitas</a>
        <a href="pengumuman.html">Pengumuman</a>
        <a href="management.html">Management</a>
      </div>
    </nav>

    <div class="konten fade-in">
      <div class="pengumuman-tanggal" id="tanggal">-</div>
      <div class="pengumuman-judul" id="judul">-</div>
      <div id="foto-container"></div>
      <div class="pengumuman-isi" id="isi">-</div>
    </div>

    <script>



      const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRIB37AAHdM1-AU03TAyE-DZ6b7MJWZTOwsgOSvOa8V-rc4OL5wZtbObgxrXQtCP2aSkj4SeArRx1c6/pub?gid=975723668&single=true&output=tsv";

      const params = new URLSearchParams(window.location.search);
      const judulCari = params.get('judul');

      fetch(SHEET_URL)
        .then(res => res.text())
        .then(csv => {
          const baris = csv.trim().split('\n').slice(1);

          baris.forEach(b => {
            const kolom = b.split('\t');
            const tanggal = kolom[0]?.trim();
            const judul = kolom[1]?.trim();
            const isi = kolom[2]?.trim();
            const foto = kolom[3]?.trim();

            if (judul === judulCari) {
              document.getElementById('tanggal').textContent = tanggal || '';
              document.getElementById('judul').textContent = judul;
              document.getElementById('isi').innerHTML = (isi || '').split('||').join('<br><br>');
              document.title = judul + ' - VLA25';

              if (foto) {
                document.getElementById('foto-container').innerHTML = `
                  <img src="foto-pengumuman/${foto}" class="pengumuman-foto" alt="${judul}">
                `;
              }
            }
          });
        });
    </script>

    <script src="animations.js"></script>
