<!DOCTYPE html>
<html>
  <head>
    <title>Profil Member - VLA25</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');

      body {
        background-color: #f5e6ff;
        background-image: radial-gradient(circle at 20% 20%, #e8b4ff 0%, transparent 50%),
                          radial-gradient(circle at 80% 80%, #c084fc 0%, transparent 50%);
        color: #4a0080;
        font-family: 'Quicksand', Arial, sans-serif;
        margin: 0;
        min-height: 100vh;
      }

      .header {
        background: linear-gradient(135deg, #2d0057 0%, #4a0080 40%, #7b2fa8 100%);
        text-align: center;
        padding: 60px 20px 40px;
        position: relative;
        overflow: hidden;
      }

      .header::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, #d308fa22 0%, transparent 60%);
        animation: shimmer 4s ease-in-out infinite;
      }

      @keyframes shimmer {
        0%, 100% { transform: translate(0, 0); }
        50% { transform: translate(10%, 10%); }
      }

      .header a {
        color: #e8b4ff;
        font-size: 12px;
        letter-spacing: 2px;
        text-decoration: none;
        display: block;
        margin-bottom: 10px;
      }

      .header a:hover { color: #ffffff; }

      .header h1 {
        color: #d308fa;
        letter-spacing: 6px;
        font-size: 48px;
        text-shadow: 0 0 20px #d308fa88;
        margin: 10px 0 0;
      }

      .navbar {
        background: linear-gradient(90deg, #1a0030, #3a0060, #1a0030);
        display: flex;
        justify-content: center;
        gap: 30px;
        padding: 14px 20px;
        border-bottom: 1px solid #d308fa44;
        position: relative;
      }

      .navbar a {
        color: #e8b4ff;
        text-decoration: none;
        font-size: 12px;
        letter-spacing: 2px;
        text-transform: uppercase;
        padding: 5px 10px;
        border-radius: 20px;
        transition: all 0.3s;
      }

      .navbar a:hover {
        color: #ffffff;
        background-color: #d308fa44;
      }

      .hamburger {
        display: none;
        background: none;
        border: none;
        cursor: pointer;
        padding: 5px;
        position: absolute;
        right: 20px;
        top: 50%;
        transform: translateY(-50%);
      }

      .hamburger span {
        display: block;
        width: 24px;
        height: 2px;
        background: #e8b4ff;
        margin: 5px 0;
        transition: all 0.3s;
      }

      .nav-links {
        display: flex;
        gap: 30px;
        align-items: center;
      }

      .profil-box {
        max-width: 600px;
        margin: 40px auto;
        padding: 30px;
        border: 1px solid #9b30d9;
        border-radius: 15px;
        background-color: #ffffff;
      }

      .foto-placeholder {
        width: 150px;
        height: 150px;
        border-radius: 50%;
        background-color: #4a0080;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
        font-size: 40px;
        color: #f0a0ff;
        overflow: hidden;
      }

      .stage-name {
        text-align: center;
        font-size: 24px;
        font-weight: bold;
        color: #d308fa;
        margin-bottom: 5px;
      }

      .full-name {
        text-align: center;
        font-size: 14px;
        color: #9b30d9;
        margin-bottom: 20px;
      }

      .badge {
        background-color: #4a0080;
        color: #f0a0ff;
        font-size: 11px;
        padding: 4px 12px;
        border-radius: 20px;
        margin: 0 auto 20px;
        display: block;
        text-align: center;
        width: fit-content;
      }

      .info-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
      }

      .info-table td {
        padding: 10px;
        border-bottom: 1px solid #f0a0ff;
        font-size: 14px;
      }

      .info-table td:first-child {
        color: #9b30d9;
        font-weight: bold;
        width: 40%;
      }

      /* MOBILE */
      @media (max-width: 600px) {
        .header h1 { font-size: 32px; letter-spacing: 4px; }

        .hamburger { display: block; }

        .nav-links {
          display: none;
          flex-direction: column;
          gap: 0;
          width: 100%;
          padding: 10px 0;
        }

        

        .nav-links a {
          padding: 12px 20px;
          border-radius: 0;
          border-bottom: 1px solid #d308fa22;
          width: 100%;
          text-align: center;
        }

        .navbar { justify-content: flex-start; flex-wrap: wrap; padding: 14px 20px; }

        .profil-box {
          margin: 20px 16px;
          padding: 20px 16px;
        }

        .foto-placeholder {
          width: 120px;
          height: 120px;
          font-size: 32px;
        }

        .stage-name { font-size: 20px; }
        .full-name { font-size: 13px; }
        .info-table td { font-size: 13px; padding: 8px; }
      }

      .navbar a.aktif {
        color: #ffffff;
        background-color: #d308fa66;
        border: 1px solid #d308fa88;
      }

      </style>
      <link rel="stylesheet" href="animations.css">
</head>
  <body>

    <div class="header">
      <img src="logo.jpeg" alt="Logo VLA25" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin-bottom: 15px;">
      <a href="members.html">← Kembali ke Members</a>
      <h1>VLA25</h1>
    </div>

    <nav class="navbar">
      <button class="hamburger" aria-label="Menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <div class="nav-links" id="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="members.html">Members</a>
        <a href="aktivitas.html">Aktivitas</a>
        <a href="pengumuman.html">Pengumuman</a>
        <a href="management.html">Management</a>
      </div>
    </nav>

    <div class="profil-box fade-in">
      <div class="foto-placeholder" id="foto">?</div>
      <div class="stage-name" id="stage-name">-</div>
      <div class="full-name" id="full-name">-</div>
      <div class="badge" id="status">-</div>
      <table class="info-table">
        <tr>
          <td>Generasi</td>
          <td id="gen">-</td>
        </tr>
        <tr>
          <td>Date of Birth</td>
          <td id="dob">-</td>
        </tr>
        <tr>
          <td>Face Claim</td>
          <td id="faceclaim">-</td>
        </tr>
      </table>
    </div>

    <script>



      const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRIB37AAHdM1-AU03TAyE-DZ6b7MJWZTOwsgOSvOa8V-rc4OL5wZtbObgxrXQtCP2aSkj4SeArRx1c6/pub?gid=0&single=true&output=csv";

      const params = new URLSearchParams(window.location.search);
      const namaCari = params.get('nama');

      fetch(SHEET_URL)
        .then(res => res.text())
        .then(csv => {
          const baris = csv.trim().split('\n').slice(1);

          baris.forEach(baris => {
            const kolom = baris.split(',');
            const gen = kolom[0]?.trim();
            const fullName = kolom[1]?.trim();
            const stageName = kolom[2]?.trim();
            const faceclaim = kolom[3]?.trim();
            const dob = kolom[4]?.trim();
            const status = kolom[5]?.trim();
            const foto = kolom[6]?.trim();

            if (fullName === namaCari) {
              document.getElementById('stage-name').textContent = stageName || fullName;
              document.getElementById('full-name').textContent = fullName;
              document.getElementById('gen').textContent = gen;
              document.getElementById('status').textContent = status || '-';
              document.getElementById('dob').textContent = dob || '?';
              document.getElementById('faceclaim').textContent = faceclaim || '?';
              document.title = (stageName || fullName) + ' - VLA25';

              const fotoEl = document.getElementById('foto');
              if (foto) {
                fotoEl.innerHTML = `<img src="idcmember/${foto}" alt="${stageName}" style="width:150px; height:150px; border-radius:50%; object-fit:cover; object-position:center;">`;
              }
            }
          });
        });
    </script>

    <script src="animations.js"></script>
</body>
</html>
