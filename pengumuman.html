  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #f5e6ff;
      background-image:
        radial-gradient(circle at 20% 20%, #e8b4ff 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, #c084fc 0%, transparent 50%);
      color: #4a0080;
      font-family: 'Quicksand', Arial, sans-serif;

    }

    /* ══ HEADER ══ */
    .header {
      height: 400px;
      background-color: #4a0080;
      text-align: center; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 60px 20px 40px; position: relative; overflow: hidden;
    }
    .header::before {
      content: ''; position: absolute; top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle, #d308fa22 0%, transparent 60%);
      animation: shimmer 4s ease-in-out infinite; pointer-events: none;
    }
    @keyframes shimmer {
      0%, 100% { transform: translate(0, 0); }
      50%       { transform: translate(10%, 10%); }
    }
    .header-logo {
      width: 100px; height: 100px; border-radius: 50%; object-fit: cover;
      margin-bottom: 15px; animation: logoPulse 3s ease-in-out infinite;
      position: relative; z-index: 1;
    }
    @keyframes logoPulse {
      0%, 100% { transform: scale(1);     box-shadow: 0 0 0 0 #d308fa44; }
      50%       { transform: scale(1.06); box-shadow: 0 0 0 14px #d308fa00; }
    }
    .header .sub-judul {
      color: #e8b4ff; letter-spacing: 8px; font-size: 11px;
      margin: 6px 0; position: relative; z-index: 1;
    }
    .header h1 {
      color: #d308fa; letter-spacing: 6px; font-size: 48px; font-weight: 700;
      animation: titleGlow 2.5s ease-in-out infinite alternate;
      margin: 8px 0; position: relative; z-index: 1;
    }
    @keyframes titleGlow {
      from { text-shadow: 0 0 10px #d308fa66, 0 0 30px #d308fa33; }
      to   { text-shadow: 0 0 25px #d308facc, 0 0 60px #d308fa88; }
    }

    /* ══ NAVBAR ══ */
    .navbar {
      background: linear-gradient(90deg, #1a0030, #3a0060, #1a0030);
      display: flex; justify-content: center;
      padding: 0 20px; border-bottom: 1px solid #d308fa44;
      position: sticky; top: 0; z-index: 100;
    }
    .nav-inner {
      max-width: 1440px; width: 100%;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 0;
    }
    .nav-brand { color: #fff; font-size: 18px; font-weight: 700; letter-spacing: 4px; text-decoration: none; }
    .nav-links { display: flex; gap: 8px; align-items: center; }
    .nav-links a {
      color: #e8b4ff; text-decoration: none; font-size: 12px;
      letter-spacing: 2px; text-transform: uppercase;
      padding: 6px 14px; border-radius: 20px;
      transition: all 0.3s; border: 1px solid transparent; position: relative;
    }
    .nav-links a::after {
      content: ''; position: absolute; bottom: 0; left: 50%;
      width: 0; height: 2px; background: #d308fa; border-radius: 2px;
      transition: width 0.3s ease, left 0.3s ease;
    }
    .nav-links a:hover { color: #fff; background: #d308fa22; }
    .nav-links a:hover::after, .nav-links a.aktif::after { width: 80%; left: 10%; }
    .nav-links a.aktif { color: #fff; background: #d308fa66; border-color: #d308fa88; }
    .hamburger { display: none; background: none; border: none; cursor: pointer; padding: 4px; }
    .hamburger span {
      display: block; width: 24px; height: 2px;
      background: #e8b4ff; margin: 5px 0; transition: all 0.3s; border-radius: 2px;
    }
    .hamburger.terbuka span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.terbuka span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .hamburger.terbuka span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* ══ KONTEN ══ */
    .konten {
      max-width: 860px;
      margin: 48px auto;
      padding: 0 40px;
    }
    .konten h2 {
      color: #4a0080; font-size: 20px; font-weight: 700;
      letter-spacing: 2px; border-bottom: 2px solid #f0a0ff;
      padding-bottom: 10px; margin-bottom: 28px;
    }

    /* ── Kartu Pengumuman ── */
    .kartu-pengumuman {
      background: #fff;
      border: 1px solid #d308fa44;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 16px;
      transition: transform 0.3s cubic-bezier(.22,.68,0,1.2),
                  box-shadow 0.3s ease, border-color 0.3s;
      box-shadow: 0 4px 15px #d308fa11;
      cursor: pointer;
    }
    .kartu-pengumuman:hover {
      transform: translateX(6px);
      box-shadow: 0 8px 28px #d308fa22;
      border-color: #d308fa88;
    }

    .kartu-preview {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .preview-foto {
      width: 84px; height: 84px;
      object-fit: cover; border-radius: 12px; flex-shrink: 0;
    }
    .preview-placeholder {
      width: 84px; height: 84px;
      background: #f0e6ff; border-radius: 12px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; color: #9b30d9;
    }

    .preview-info { flex: 1; }

    .pengumuman-tanggal {
      font-size: 11px; letter-spacing: 2px;
      text-transform: uppercase; color: #9b30d9; margin-bottom: 5px;
    }
    .pengumuman-judul {
      font-size: 16px; font-weight: 700;
      color: #d308fa; margin-bottom: 10px; line-height: 1.4;
    }

    .tombol-more {
      display: inline-block;
      background: linear-gradient(135deg, #9b30d9, #d308fa);
      color: #fff; border: none;
      padding: 6px 18px; border-radius: 20px;
      font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
      cursor: pointer; font-family: 'Quicksand', sans-serif; font-weight: 700;
      transition: transform 0.3s, box-shadow 0.3s;
      animation: tombolPulse 2s ease-in-out infinite;
      position: relative; overflow: hidden;
    }
    .tombol-more:hover {
      animation: none;
      transform: translateY(-2px);
      box-shadow: 0 6px 18px #d308fa55;
    }
    @keyframes tombolPulse {
      0%, 100% { box-shadow: 0 4px 15px #d308fa33; }
      50%       { box-shadow: 0 4px 25px #d308fa77; }
    }

    .kosong {
      text-align: center; color: #9b30d9;
      font-style: italic; padding: 60px 20px;
    }

    /* ══ FOOTER ══ */
    footer {
      background-color: #4a0080;
      text-align: center; padding: 48px 20px; margin-top: 60px;
      position: relative; overflow: hidden; border-top: 1px solid #d308fa44;
    }
    footer::before {
      content: ''; position: absolute; top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle, #d308fa11 0%, transparent 60%);
      pointer-events: none;
    }
    .footer-logo { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; margin-bottom: 12px; border: 2px solid #d308fa66; }
    .footer-nama { color: #d308fa; font-size: 20px; font-weight: 700; letter-spacing: 4px; margin-bottom: 4px; }
    .footer-sub  { color: #e8b4ff; font-size: 10px; letter-spacing: 6px; margin-bottom: 20px; }
    .footer-sosmed { display: flex; justify-content: center; gap: 12px; margin-bottom: 20px; }
    .footer-sosmed a {
      display: flex; align-items: center; justify-content: center;
      width: 40px; height: 40px; border-radius: 50%;
      border: 1px solid #d308fa66; color: #e8b4ff; text-decoration: none; transition: all 0.3s;
    }
    .footer-sosmed a:hover { background: #d308fa33; border-color: #d308fa; color: #fff; transform: translateY(-3px); }
    .footer-copy { color: #9b30d966; font-size: 11px; letter-spacing: 1px; }

    /* ══ MOBILE ══ */
    @media (max-width: 768px) {
      .header h1 { font-size: 36px; }
      .hamburger { display: block; }
      .nav-links {
        display: none; flex-direction: column; gap: 0;
        width: 100%; max-height: 0; overflow: hidden; opacity: 0;
        transition: max-height 0.35s cubic-bezier(.4,0,.2,1), opacity 0.3s;
      }
      .nav-links.aktif { display: flex; max-height: 400px; opacity: 1; }
      .nav-links a { border-radius: 0; border-bottom: 1px solid #d308fa22; padding: 12px 20px; width: 100%; text-align: center; }
      .nav-inner { flex-wrap: wrap; }
      .konten { padding: 0 16px; margin: 28px auto; }
      .preview-foto, .preview-placeholder { width: 64px; height: 64px; font-size: 20px; }
      .pengumuman-judul { font-size: 14px; }
      .pengumuman-tanggal { font-size: 10px; }
      .tombol-more { font-size: 10px; padding: 5px 14px; }
    }

  
    /* ── PAGE TRANSITION OVERLAY ──
       Ganti warna #fdf3f6 di bawah untuk ubah warna overlay transisi.
       Pilihan: #fdf3f6 (pink tema), #ffffff (putih), #1a0a14 (gelap)      */
    #page-overlay {

      background: #fdf3f6;
      opacity: 0; pointer-events: none;
      transition: opacity 0.35s ease;
    }
    #page-overlay.fade-out { opacity: 1; pointer-events: all; }
  </style>

  <script>
    /* ── SCROLL REVEAL (re-run setelah data dimuat) ── */
    function initReveal() {
      const obs = new IntersectionObserver((entries) => {
        entries.forEach(e => {
          if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
        });
      }, { threshold: 0.1 });
      document.querySelectorAll('.kartu-pengumuman:not(.skeleton)').forEach(el => {
        if (el.classList.contains('reveal')) return;
        el.classList.add('reveal');
        obs.observe(el);
      });
    }

    /* ── FETCH PENGUMUMAN ── */
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRIB37AAHdM1-AU03TAyE-DZ6b7MJWZTOwsgOSvOa8V-rc4OL5wZtbObgxrXQtCP2aSkj4SeArRx1c6/pub?gid=975723668&single=true&output=tsv";
    const cont = document.getElementById('list-pengumuman');

    fetch(SHEET_URL)
      .then(r => r.text())
      .then(tsv => {
        const baris = tsv.trim().split('\n').slice(1).filter(b => b.trim());
        cont.innerHTML = '';

        if (!baris.length) {
          cont.innerHTML = '<div class="kosong">Belum ada pengumuman.</div>';
          return;
        }

        [...baris].reverse().forEach(b => {
          const k     = b.split('\t');
          const tgl   = k[0]?.trim() || '';
          const judul = k[1]?.trim() || '';
          const foto  = k[3]?.trim() || '';
          if (!judul) return;

          const kartu = document.createElement('div');
          kartu.className = 'kartu-pengumuman';
          kartu.innerHTML = `
            <div class="kartu-preview">
              ${foto
                ? `<img src="foto-pengumuman/${foto}" class="preview-foto" alt="${judul}">`
                : `<div class="preview-placeholder">📢</div>`
              }
              <div class="preview-info">
                <div class="pengumuman-tanggal">${tgl}</div>
                <div class="pengumuman-judul">${judul}</div>
                <button class="tombol-more">Selengkapnya</button>
              </div>
            </div>
          `;
          kartu.querySelector('.tombol-more').addEventListener('click', () => {
            window.location = `detail-pengumuman.html?judul=${encodeURIComponent(judul)}`;
          });
          cont.appendChild(kartu);
        });

        setTimeout(function(){ (window.vla_initReveal || initReveal)(); }, 100);
      })
      .catch(() => {
        cont.innerHTML = '<div class="kosong">Gagal memuat pengumuman.</div>';
      });
  </script>

  <script>
    // ── PAGE TRANSITION ──
    const _overlay = document.getElementById('page-overlay');
    document.querySelectorAll('a[href]').forEach(link => {
      const href = link.getAttribute('href');
      if (!href || href.startsWith('#') || href.startsWith('http') || href.startsWith('mailto') || href.startsWith('javascript')) return;
      link.addEventListener('click', function(e) {
        e.preventDefault();
        _overlay.classList.add('fade-out');
        setTimeout(() => { window.location.href = href; }, 370);
      });
    });
    window.addEventListener('pageshow', () => {
      _overlay.classList.remove('fade-out');
    });
  </script>
