  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #f5e6ff;
      background-image:
        radial-gradient(circle at 20% 20%, #e8b4ff 0%, transparent 50%),

    /* ══ HEADER ══ */
    .header {
      height: 400px;
      background-color: #4a0080;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px 40px;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle, #d308fa22 0%, transparent 60%);
      animation: shimmer 4s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes shimmer {
      0%, 100% { transform: translate(0, 0); }
      50%       { transform: translate(10%, 10%); }
    }
    .header-logo {
      width: 100px; height: 100px;
      border-radius: 50%; object-fit: cover;
      margin-bottom: 15px;
      animation: logoPulse 3s ease-in-out infinite;
      position: relative; z-index: 1;
    }
    @keyframes logoPulse {
      0%, 100% { transform: scale(1);     box-shadow: 0 0 0 0 #d308fa44; }
      50%       { transform: scale(1.06); box-shadow: 0 0 0 14px #d308fa00; }
    }
    .header .sub-judul {
      color: #e8b4ff; letter-spacing: 8px; font-size: 11px;
      margin: 6px 0; position: relative; z-index: 1;
    }
    .header h1 {
      color: #d308fa; letter-spacing: 6px; font-size: 48px; font-weight: 700;
      animation: titleGlow 2.5s ease-in-out infinite alternate;
      margin: 8px 0; position: relative; z-index: 1;
    }
    @keyframes titleGlow {
      from { text-shadow: 0 0 10px #d308fa66, 0 0 30px #d308fa33; }
      to   { text-shadow: 0 0 25px #d308facc, 0 0 60px #d308fa88; }
    }

    /* ══ NAVBAR ══ */
    .navbar {
      background: linear-gradient(90deg, #1a0030, #3a0060, #1a0030);
      display: flex; justify-content: center;
      padding: 0 20px;
      border-bottom: 1px solid #d308fa44;
      position: sticky; top: 0; z-index: 100;
    }
    .nav-inner {
      max-width: 1440px; width: 100%;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 0;
    }
    .nav-brand { color: #fff; font-size: 18px; font-weight: 700; letter-spacing: 4px; text-decoration: none; }
    .nav-links { display: flex; gap: 8px; align-items: center; }
    .nav-links a {
      color: #e8b4ff; text-decoration: none; font-size: 12px;
      letter-spacing: 2px; text-transform: uppercase;
      padding: 6px 14px; border-radius: 20px;
      transition: all 0.3s; border: 1px solid transparent; position: relative;
    }
    .nav-links a::after {
      content: ''; position: absolute; bottom: 0; left: 50%;
      width: 0; height: 2px; background: #d308fa; border-radius: 2px;
      transition: width 0.3s ease, left 0.3s ease;
    }
    .nav-links a:hover { color: #fff; background: #d308fa22; }
    .nav-links a:hover::after, .nav-links a.aktif::after { width: 80%; left: 10%; }
    .nav-links a.aktif { color: #fff; background: #d308fa66; border-color: #d308fa88; }
    .hamburger { display: none; background: none; border: none; cursor: pointer; padding: 4px; }
    .hamburger span {
      display: block; width: 24px; height: 2px;
      background: #e8b4ff; margin: 5px 0; transition: all 0.3s; border-radius: 2px;
    }
    .hamburger.terbuka span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.terbuka span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .hamburger.terbuka span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* ══ KONTEN ══ */
    .konten {
      max-width: 1440px;

      padding: 0 40px;
    }
    .konten h2 {

      padding-bottom: 10px; margin-bottom: 40px; text-align: center;
    }

    /* ══ HIERARKI ══ */
    .hierarki {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .level {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .garis {
      width: 2px;
      height: 28px;
      background: linear-gradient(to bottom, #9b30d9, #d308fa66);
      margin: 0 auto;
      border-radius: 2px;
      animation: garisGrow 0.5s ease both;
      transform-origin: top;
    }
    @keyframes garisGrow {
      from { transform: scaleY(0); }
      to   { transform: scaleY(1); }
    }

    .kartu-mgmt {
      background: linear-gradient(135deg, #4a0080, #7b2fa8);
      border: 1px solid #d308fa66;
      border-radius: 14px;
      padding: 14px 22px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.3s cubic-bezier(.22,.68,0,1.4),
                  box-shadow 0.3s ease, border-color 0.3s;
      box-shadow: 0 4px 15px #d308fa22;
      min-width: 120px;
      position: relative;
      overflow: hidden;
    }
    .kartu-mgmt::before {
      content: '';
      position: absolute;
      top: 0; left: -100%; width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, #ffffff08, transparent);
      transition: left 0.4s ease;
    }
    .kartu-mgmt:hover::before { left: 160%; }
    .kartu-mgmt:hover {
      transform: translateY(-4px) scale(1.03);
      box-shadow: 0 10px 28px #d308fa44;
      border-color: #d308fa;
    }
    .kartu-mgmt img {
      width: 58px; height: 58px;
      border-radius: 50%; object-fit: cover; object-position: center;
      margin-bottom: 8px;
      border: 2px solid #d308fa66;
      display: block; margin-left: auto; margin-right: auto;
    }
    .kartu-avatar {
      width: 58px; height: 58px;
      border-radius: 50%;
      background: linear-gradient(135deg, #9b30d9, #d308fa);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 8px;
      font-size: 18px; font-weight: 700; color: #fff;
      border: 2px solid #d308fa66;
    }
    .kartu-jabatan {
      font-size: 10px; letter-spacing: 2px;
      text-transform: uppercase; color: #e8b4ff; margin-bottom: 5px;
    }
    .kartu-nama {
      font-size: 14px; font-weight: 700; color: #fff;
    }

    /* Label jabatan di atas setiap level */

    .footer-nama { color: #d308fa; font-size: 20px; font-weight: 700; letter-spacing: 4px; margin-bottom: 4px; }
    .footer-sub  { color: #e8b4ff; font-size: 10px; letter-spacing: 6px; margin-bottom: 20px; }

    /* ══ MOBILE ══ */

      .nav-inner { flex-wrap: wrap; }

      .kartu-mgmt img, .kartu-avatar { width: 46px; height: 46px; }
      .kartu-nama { font-size: 12px; }
      .level { gap: 8px; }
    }

  <script>
    /* ── SCROLL REVEAL (re-run setelah data dimuat) ── */
    function initReveal() {
      const obs = new IntersectionObserver((entries) => {
        entries.forEach(e => {
          if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
        });
      }, { threshold: 0.1 });
      document.querySelectorAll('.kartu-mgmt:not(.skeleton)').forEach(el => {
        el.classList.add('reveal');
        const p = el.parentElement;
        if (p && !p.classList.contains('reveal-group')) p.classList.add('reveal-group');
        obs.observe(el);
      });
    }

    /* ── FETCH MANAGEMENT ── */
    const SHEET_URL      = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRIB37AAHdM1-AU03TAyE-DZ6b7MJWZTOwsgOSvOa8V-rc4OL5wZtbObgxrXQtCP2aSkj4SeArRx1c6/pub?gid=227599210&single=true&output=csv";
    const urutanJabatan  = ['Founder', 'Co-Founder', 'Penasihat', 'Sekretaris', 'Admin', 'Coach Vocal', 'Staff'];

    function inisial(nama) {
      const b = nama.replace(/[^a-zA-Z\s]/g,'').trim().split(' ');
      return ((b[0]?.[0]||'') + (b[1]?.[0]||'')).toUpperCase();
    }

    fetch(SHEET_URL)
      .then(r => r.text())
      .then(csv => {
        const baris = csv.trim().split('\n').slice(1);
        const grup  = {};

        baris.forEach(b => {
          const k           = b.split(',');
          const namaLengkap = k[0]?.trim();
          const namaPanggil = k[1]?.trim();
          const jabatan     = k[2]?.trim();
          const foto        = k[5]?.trim();
          if (!namaLengkap) return;
          if (!grup[jabatan]) grup[jabatan] = [];
          grup[jabatan].push({ namaLengkap, namaPanggil, jabatan, foto });
        });

        const hierarki = document.getElementById('hierarki');
        hierarki.innerHTML = '';

        urutanJabatan.forEach((jabatan, i) => {
          if (!grup[jabatan]) return;

          if (i > 0 && hierarki.children.length > 0) {
            const garis = document.createElement('div');
            garis.className = 'garis';
            hierarki.appendChild(garis);
          }

          const level = document.createElement('div');
          level.className = 'level';

          grup[jabatan].forEach(({ namaLengkap, namaPanggil, jabatan, foto }) => {
            const nama  = namaPanggil || namaLengkap;
            const kartu = document.createElement('div');
            kartu.className = 'kartu-mgmt';
            kartu.innerHTML = foto
              ? `<img src="idcmanagement/${foto}" alt="${nama}">
                 <div class="kartu-jabatan">${jabatan}</div>
                 <div class="kartu-nama">${nama}</div>`
              : `<div class="kartu-avatar">${inisial(nama)}</div>
                 <div class="kartu-jabatan">${jabatan}</div>
                 <div class="kartu-nama">${nama}</div>`;
            kartu.addEventListener('click', () => {
              window.location = `profil-management.html?nama=${encodeURIComponent(namaLengkap)}`;
            });
            level.appendChild(kartu);
          });

          hierarki.appendChild(level);
        });

        setTimeout(function(){ (window.vla_initReveal || initReveal)(); }, 100);
      })
      .catch(() => {
        document.getElementById('hierarki').innerHTML =
          '<p style="text-align:center;color:#9b30d9;font-style:italic;padding:40px;">Gagal memuat data management.</p>';
      });
  </script>

      link.addEventListener('click', function(e) {
        e.preventDefault();
        _overlay.classList.add('fade-out');
        setTimeout(() => { window.location.href = href; }, 370);
      });
    });
    window.addEventListener('pageshow', () => {
      _overlay.classList.remove('fade-out');
