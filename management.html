<!DOCTYPE html>
<html>
  <head>
    <title>Management - VLA25</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');

      body {
        background-color: #f5e6ff;
        background-image: radial-gradient(circle at 20% 20%, #e8b4ff 0%, transparent 50%),
                          radial-gradient(circle at 80% 80%, #c084fc 0%, transparent 50%);
        color: #4a0080;
        font-family: 'Quicksand', Arial, sans-serif;
        margin: 0;
        min-height: 100vh;
      }

      .header {
        background: linear-gradient(135deg, #2d0057 0%, #4a0080 40%, #7b2fa8 100%);
        text-align: center;
        padding: 60px 20px 40px;
        position: relative;
        overflow: hidden;
      }

      .header::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, #d308fa22 0%, transparent 60%);
        animation: shimmer 4s ease-in-out infinite;
      }

      @keyframes shimmer {
        0%, 100% { transform: translate(0, 0); }
        50% { transform: translate(10%, 10%); }
      }

      .header h1 {
        color: #d308fa;
        letter-spacing: 6px;
        font-size: 48px;
        text-shadow: 0 0 20px #d308fa88;
        margin: 10px 0;
      }

      .sub-judul {
        color: #e8b4ff;
        letter-spacing: 8px;
        font-size: 11px;
        margin: 8px 0;
      }

      .navbar {
        background: linear-gradient(90deg, #1a0030, #3a0060, #1a0030);
        display: flex;
        justify-content: center;
        gap: 30px;
        padding: 14px 20px;
        border-bottom: 1px solid #d308fa44;
        position: relative;
      }

      .navbar a {
        color: #e8b4ff;
        text-decoration: none;
        font-size: 12px;
        letter-spacing: 2px;
        text-transform: uppercase;
        padding: 5px 10px;
        border-radius: 20px;
        transition: all 0.3s;
      }

      .navbar a:hover {
        color: #ffffff;
        background-color: #d308fa44;
      }

      .hamburger {
        display: none;
        background: none;
        border: none;
        cursor: pointer;
        padding: 5px;
        position: absolute;
        right: 20px;
        top: 50%;
        transform: translateY(-50%);
      }

      .hamburger span {
        display: block;
        width: 24px;
        height: 2px;
        background: #e8b4ff;
        margin: 5px 0;
        transition: all 0.3s;
      }

      .nav-links {
        display: flex;
        gap: 30px;
        align-items: center;
      }

      .konten {
        max-width: 800px;
        margin: 40px auto;
        padding: 0 30px;
      }

      .konten h2 {
        color: #9b30d9;
        letter-spacing: 2px;
        border-bottom: 2px solid #f0a0ff;
        padding-bottom: 8px;
        margin-bottom: 30px;
        text-align: center;
      }

      .hierarki {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
      }

      .level {
        display: flex;
        justify-content: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .garis {
        width: 1px;
        height: 24px;
        background-color: #9b30d9;
        margin: 0 auto;
      }

      .kartu-mgmt {
        background: linear-gradient(135deg, #4a0080, #7b2fa8);
        border: 1px solid #d308fa66;
        border-radius: 12px;
        padding: 12px 20px;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s;
        box-shadow: 0 4px 15px #d308fa22;
        min-width: 120px;
      }

      .kartu-mgmt:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 25px #d308fa44;
        border-color: #d308fa;
      }

      .kartu-mgmt img {
        width: 55px;
        height: 55px;
        border-radius: 50%;
        object-fit: cover;
        object-position: center;
        margin-bottom: 8px;
      }

      .kartu-jabatan {
        font-size: 10px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #e8b4ff;
        margin-bottom: 4px;
      }

      .kartu-nama {
        font-size: 14px;
        font-weight: 700;
        color: #ffffff;
      }

      /* MOBILE */
      @media (max-width: 600px) {
        .header h1 { font-size: 32px; letter-spacing: 4px; }

        .hamburger { display: block; }

        .nav-links {
          display: none;
          flex-direction: column;
          gap: 0;
          width: 100%;
          padding: 10px 0;
        }

        

        .nav-links a {
          padding: 12px 20px;
          border-radius: 0;
          border-bottom: 1px solid #d308fa22;
          width: 100%;
          text-align: center;
        }

        .navbar { justify-content: flex-start; flex-wrap: wrap; padding: 14px 20px; }

        .konten { padding: 0 16px; margin: 24px auto; }

        .kartu-mgmt {
          min-width: 90px;
          padding: 10px 14px;
        }

        .kartu-mgmt img { width: 44px; height: 44px; }
        .kartu-nama { font-size: 12px; }
        .level { gap: 8px; }
      }

      .navbar a.aktif {
        color: #ffffff;
        background-color: #d308fa66;
        border: 1px solid #d308fa88;
      }

      </style>
      <link rel="stylesheet" href="animations.css">
</head>
  <body>

    <div class="header">
      <img src="logo.jpeg" alt="Logo VLA25" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin-bottom: 15px;">
      <p class="sub-judul">OFFICIAL FAN SITE</p>
      <h1>VLA25</h1>
      <p class="sub-judul">VELORA25</p>
    </div>

    <nav class="navbar">
      <button class="hamburger" aria-label="Menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <div class="nav-links" id="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="members.html">Members</a>
        <a href="aktivitas.html">Aktivitas</a>
        <a href="pengumuman.html">Pengumuman</a>
        <a href="management.html">Management</a>
      </div>
    </nav>

    <div class="konten">
      <h2>Struktur Management</h2>
      <div class="hierarki" id="hierarki"></div>
    </div>

    <script>



      const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRIB37AAHdM1-AU03TAyE-DZ6b7MJWZTOwsgOSvOa8V-rc4OL5wZtbObgxrXQtCP2aSkj4SeArRx1c6/pub?gid=227599210&single=true&output=csv";

      const urutanJabatan = ['Founder', 'Penasihat', 'Sekretaris', 'Admin', 'Coach Vocal', 'Staff'];

      fetch(SHEET_URL)
        .then(res => res.text())
        .then(csv => {
          const baris = csv.trim().split('\n').slice(1);
          const grupJabatan = {};

          baris.forEach(b => {
            const kolom = b.split(',');
            const namaLengkap = kolom[0]?.trim();
            const namaPanggilan = kolom[1]?.trim();
            const jabatan = kolom[2]?.trim();
            const foto = kolom[5]?.trim();
            if (!namaLengkap) return;

            if (!grupJabatan[jabatan]) grupJabatan[jabatan] = [];
            grupJabatan[jabatan].push({ namaLengkap, namaPanggilan, jabatan, foto });
          });

          const hierarki = document.getElementById('hierarki');

          urutanJabatan.forEach((jabatan, i) => {
            if (!grupJabatan[jabatan]) return;

            if (i > 0) {
              const garis = document.createElement('div');
              garis.className = 'garis';
              hierarki.appendChild(garis);
            }

            const level = document.createElement('div');
            level.className = 'level';

            grupJabatan[jabatan].forEach(({ namaLengkap, namaPanggilan, jabatan, foto }) => {
              const kartu = document.createElement('div');
              kartu.className = 'kartu-mgmt fade-in';
              kartu.innerHTML = `
                ${foto ? `<img src="idcmanagement/${foto}" alt="${namaPanggilan || namaLengkap}">` : ''}
                <div class="kartu-jabatan">${jabatan}</div>
                <div class="kartu-nama">${namaPanggilan || namaLengkap}</div>
              `;
              kartu.onclick = () => window.location = `profil-management.html?nama=${encodeURIComponent(namaLengkap)}`;
              level.appendChild(kartu);
            });

            hierarki.appendChild(level);
          });
        });
    </script>

    <script src="animations.js"></script>
</body>
</html>
